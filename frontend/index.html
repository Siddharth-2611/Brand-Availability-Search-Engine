<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>brandscan — is your name taken?</title>
<meta name="description" content="Check brand name availability across 27 platforms simultaneously." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink:          #0A0912;
    --ink-surface:  #131120;
    --ink-raised:   #1B1830;
    --ink-line:     #2A2645;
    --violet-400:   #A78BFA;
    --violet-500:   #7C5CFC;
    --violet-600:   #6339F5;
    --signal:       #2FD98A;
    --signal-dim:   #1B4D38;
    --coral:        #FF6B6B;
    --coral-dim:    #4D2323;
    --mist:         #9490AC;
    --mist-dim:     #5C5876;
    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--ink);
    color: #fff;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .font-display { font-family: 'Space Grotesk', sans-serif; }
  .font-mono    { font-family: 'JetBrains Mono', monospace; }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font: inherit; color: inherit; }

  ::selection { background: var(--violet-500); color: #fff; }

  ::-webkit-scrollbar       { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--ink-surface); }
  ::-webkit-scrollbar-thumb { background: var(--violet-600); border-radius: 3px; }

  a:focus-visible, button:focus-visible, input:focus-visible {
    outline: 2px solid var(--violet-500);
    outline-offset: 2px;
  }

  /* ── Layout shells ─────────────────────────────────────────────── */

  .wrap-nav    { max-width: 1040px; margin: 0 auto; padding: 20px 24px; }
  .wrap-search { max-width: 720px;  margin: 0 auto; padding: 40px 24px 32px; }
  .wrap-results{ max-width: 1040px; margin: 0 auto; padding: 0 24px 96px; }

  /* ── Nav ───────────────────────────────────────────────────────── */

  nav {
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark {
    width: 24px; height: 24px; border-radius: 6px;
    background: linear-gradient(135deg, var(--violet-400), var(--violet-600));
  }
  .logo-text { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .nav-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--mist);
  }
  .dot-pulse {
    width: 6px; height: 6px; border-radius: 50%; background: var(--signal);
    animation: pulse-dot 1.8s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Hero ──────────────────────────────────────────────────────── */

  .hero { text-align: center; margin-bottom: 32px; }
  .hero h1 {
    font-size: clamp(32px, 6vw, 48px);
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .hero h1 span { color: var(--violet-400); }
  .hero p { color: var(--mist); font-size: 15px; max-width: 420px; margin: 0 auto; }
  .hero.hidden { display: none; }

  /* ── Search bar ────────────────────────────────────────────────── */

  .search-shell { position: relative; }
  .search-bar {
    display: flex; align-items: center; gap: 12px;
    background: var(--ink-surface);
    border: 1px solid var(--ink-line);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    transition: border-color 0.15s ease;
  }
  .search-bar:focus-within { border-color: var(--violet-500); }
  .search-bar svg.icon-search { color: var(--mist); flex-shrink: 0; }

  #query-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 15px; font-family: 'JetBrains Mono', monospace;
  }
  #query-input::placeholder { color: var(--mist-dim); }

  kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--mist-dim);
    border: 1px solid var(--ink-line); border-radius: 4px;
    padding: 2px 6px; display: none;
  }
  @media (min-width: 640px) { kbd { display: block; } }

  .scan-btn {
    background: var(--violet-500);
    border-radius: 12px;
    padding: 9px 18px;
    font-size: 14px; font-weight: 500; color: #fff;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }
  .scan-btn:hover { background: var(--violet-600); }
  .scan-btn:disabled { opacity: 0.4; cursor: default; }

  .scan-sweep {
    position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
    overflow: hidden; border-radius: 999px; display: none;
  }
  .scan-sweep.active { display: block; }
  .scan-sweep-inner {
    height: 100%; width: 33%;
    background: linear-gradient(90deg, transparent, var(--violet-400), transparent);
    animation: sweep 1.6s ease-in-out infinite;
  }
  @keyframes sweep {
    0%   { transform: translateX(-100%); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateX(300%); opacity: 0; }
  }

  /* ── Autocomplete dropdown ─────────────────────────────────────── */

  .dropdown {
    position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px;
    background: var(--ink-surface);
    border: 1px solid var(--ink-line);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    z-index: 50;
    display: none;
  }
  .dropdown.open { display: block; }
  .dropdown-correction {
    padding: 8px 16px; font-size: 12px; color: var(--violet-400);
    border-bottom: 1px solid var(--ink-line);
    display: flex; align-items: center; gap: 6px;
  }
  .dropdown-item {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 10px 16px; text-align: left;
    transition: background 0.1s ease;
  }
  .dropdown-item:hover { background: var(--ink-raised); }
  .dropdown-item .word { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .dropdown-item .freq { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--mist); }

  .correction-pill {
    margin-top: 12px; font-size: 13px; color: var(--violet-400);
    background: none; display: none;
  }
  .correction-pill.show { display: inline-block; }

  /* ── Stats row ─────────────────────────────────────────────────── */

  .stats-row {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    margin-bottom: 24px; display: none;
  }
  .stats-row.show { display: grid; }
  @media (min-width: 640px) { .stats-row { grid-template-columns: repeat(4, 1fr); } }

  .stat-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--ink-surface); border: 1px solid var(--ink-line);
    border-radius: var(--radius-sm); padding: 10px 14px;
  }
  .stat-icon { color: var(--violet-400); flex-shrink: 0; }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--mist); margin-top: 4px; line-height: 1; }

  /* ── Tabs ──────────────────────────────────────────────────────── */

  .tabs {
    display: none; gap: 4px; width: fit-content;
    background: var(--ink-surface); border: 1px solid var(--ink-line);
    border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px;
  }
  .tabs.show { display: flex; }
  .tab-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px;
    font-family: 'JetBrains Mono', monospace; font-weight: 500;
    color: var(--mist); transition: all 0.15s ease;
  }
  .tab-btn.active { background: var(--violet-500); color: #fff; }
  .tab-btn:not(.active):hover { color: #fff; }

  /* ── Platform tiles ────────────────────────────────────────────── */

  .category-block { margin-bottom: 24px; }
  .category-title {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--mist); margin-bottom: 10px;
  }
  .tile-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
  }
  @media (min-width: 640px) { .tile-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 900px) { .tile-grid { grid-template-columns: repeat(4, 1fr); } }

  .p-tile {
    display: flex; align-items: center; gap: 12px;
    border-radius: var(--radius-md);
    padding: 12px 14px;
    border: 1px solid var(--ink-line);
    box-shadow: inset 0 0 0 1px transparent;
    transition: transform 0.15s ease;
    opacity: 0; transform: translateY(6px) scale(0.97);
    animation: tile-in 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .p-tile:hover { transform: translateY(-2px); }
  @keyframes tile-in { to { opacity: 1; transform: translateY(0) scale(1); } }

  .p-tile.open  { background: rgba(47,217,138,0.08);  box-shadow: inset 0 0 0 1px rgba(47,217,138,0.4); }
  .p-tile.taken { background: rgba(255,107,107,0.08); box-shadow: inset 0 0 0 1px rgba(255,107,107,0.4); }
  .p-tile.na    { background: var(--ink-raised);       box-shadow: inset 0 0 0 1px rgba(148,144,172,0.25); }

  .p-icon-wrap {
    width: 18px; height: 18px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .p-icon-wrap img { width: 16px; height: 16px; object-fit: contain; }
  .p-icon-fallback {
    width: 18px; height: 18px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; font-family: 'Space Grotesk', sans-serif;
    background: var(--ink-line); color: #fff;
  }

  .p-info { flex: 1; min-width: 0; }
  .p-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-status { font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
  .p-tile.open  .p-status { color: var(--signal); }
  .p-tile.taken .p-status { color: var(--coral); }
  .p-tile.na    .p-status { color: var(--mist); }

  .p-status-icon { flex-shrink: 0; }
  .p-tile.open  .p-status-icon { color: var(--signal); }
  .p-tile.taken .p-status-icon { color: var(--coral); }
  .p-tile.na    .p-status-icon { color: var(--mist); }

  /* ── Error banner ──────────────────────────────────────────────── */
  .error-banner {
    display: none;
    align-items: flex-start; gap: 10px;
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.35);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13px; color: #ffb3b3;
  }
  .error-banner.show { display: flex; }
  .error-banner strong { color: #fff; }
  .error-banner code {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 4px;
    font-size: 12px;
  }
  .error-banner svg { flex-shrink: 0; margin-top: 1px; color: var(--coral); }

  /* ── Search results list ───────────────────────────────────────── */

  .result-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--ink-surface); border: 1px solid var(--ink-line);
    border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 8px;
  }
  .result-name { font-weight: 500; }
  .result-desc { font-size: 13px; color: var(--mist); margin-top: 2px; }
  .result-meta { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--mist-dim); margin-top: 6px; }
  .result-rank { font-family: 'JetBrains Mono', monospace; color: var(--violet-400); font-size: 14px; flex-shrink: 0; margin-left: 12px; }

  /* ── Trending ──────────────────────────────────────────────────── */

  .trending-section { margin-top: 48px; display: none; }
  .trending-section.show { display: block; }
  .trending-title {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--mist);
    margin-bottom: 12px;
  }
  .trending-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--ink-line); background: var(--ink-surface);
    border-radius: 999px; padding: 6px 12px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    transition: border-color 0.15s ease;
  }
  .chip:hover { border-color: var(--violet-500); }
  .chip .rank { color: var(--violet-400); }
  .chip .count { color: var(--mist-dim); }

  /* ── Pipeline panel ────────────────────────────────────────────── */

  .pipeline {
    margin-top: 64px;
    background: var(--ink-surface); border: 1px solid var(--ink-line);
    border-radius: var(--radius-lg); padding: 24px;
  }
  .pipeline-title {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--mist);
    margin-bottom: 16px;
  }
  .pipeline-grid {
    display: grid; grid-template-columns: 1fr; gap: 1px;
    background: var(--ink-line); border-radius: 12px; overflow: hidden;
  }
  @media (min-width: 640px) { .pipeline-grid { grid-template-columns: 1fr 1fr; } }
  .pipeline-item { background: var(--ink-surface); padding: 16px; }
  .pipeline-step { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--violet-400); margin-bottom: 4px; }
  .pipeline-detail { font-size: 12px; color: var(--mist); }

  @media (prefers-reduced-motion: reduce) {
    .scan-sweep-inner, .dot-pulse, .p-tile { animation: none !important; opacity: 1 !important; transform: none !important; }
  }
</style>
</head>

<nav class="wrap-nav">

<div class="wrap-search">

      <input id="query-input" type="text" placeholder="bytebot, agentai, devforge…" autocomplete="off" />

  <div class="stats-row" id="stats-row"></div>

  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="platforms">availability</button>
    <button class="tab-btn" data-tab="search">ranked_results</button>
  </div>

  <div id="platforms-panel"></div>
  <div id="search-panel" style="display:none;"></div>

  <div class="trending-section" id="trending-section">
    <div class="trending-title">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      trending
    </div>

<script>
// ── Config ──────────────────────────────────────────────────────────────
const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
  ? "http://localhost:8000"
  : "http://localhost:8000"; // change this to your deployed API origin

// ── Icon mapping (Simple Icons public CDN — no build step required) ─────
const ICON_SLUGS = {
  Instagram: "instagram", Twitter: "x", TikTok: "tiktok", YouTube: "youtube",
  Pinterest: "pinterest", Snapchat: "snapchat", Telegram: "telegram",
  LinkedIn: "linkedin", Facebook: "facebook", Reddit: "reddit",
  GitHub: "github", GitLab: "gitlab", "Dev.to": "devdotto", Medium: "medium",
  HackerNews: "ycombinator", npm: "npm", PyPI: "pypi", Replit: "replit",
  Hashnode: "hashnode", CodePen: "codepen", Twitch: "twitch", Discord: "discord",
  Steam: "steam", Behance: "behance", Dribbble: "dribbble", Vimeo: "vimeo",
  SoundCloud: "soundcloud", Spotify: "spotify",
};

function iconMarkup(platformName, category) {
  if (category === "domain") {
    return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
  }
  const slug = ICON_SLUGS[platformName];
  const initial = platformName.charAt(0).toUpperCase();
  if (!slug) return `<div class="p-icon-fallback">${initial}</div>`;
  const src = `https://cdn.simpleicons.org/${slug}/ffffff`;
  return `<img src="${src}" alt="" onerror="this.parentElement.innerHTML='<div class=&quot;p-icon-fallback&quot;>${initial}</div>'" />`;
}

// ── State ───────────────────────────────────────────────────────────────
let debounceTimer = null;
let currentCorrection = null;
let hasSearched = false;

const el = {
  input:       document.getElementById("query-input"),
  scanBtn:     document.getElementById("scan-btn"),
  scanSweep:   document.getElementById("scan-sweep"),
  dropdown:    document.getElementById("dropdown"),
  hero:        document.getElementById("hero"),
  correction:  document.getElementById("correction-pill"),
  statsRow:    document.getElementById("stats-row"),
  tabs:        document.getElementById("tabs"),
  platformsPanel: document.getElementById("platforms-panel"),
  searchPanel:    document.getElementById("search-panel"),
  trendingSection: document.getElementById("trending-section"),
  trendingChips:   document.getElementById("trending-chips"),
  errorBanner:     document.getElementById("error-banner"),
  errorApiUrl:     document.getElementById("error-api-url"),
};
el.errorApiUrl.textContent = API;

// ── Autocomplete ────────────────────────────────────────────────────────
el.input.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  const q = el.input.value.trim();
  if (q.length < 2) { closeDropdown(); return; }
  debounceTimer = setTimeout(() => fetchAutocomplete(q), 180);
});

el.input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") runSearch(el.input.value);
  if (e.key === "Escape") closeDropdown();
});

el.scanBtn.addEventListener("click", () => runSearch(el.input.value));

async function fetchAutocomplete(q) {
  try {
    const res = await fetch(`${API}/api/v1/autocomplete?q=${encodeURIComponent(q)}&limit=8`);
    const data = await res.json();
    renderDropdown(data.suggestions || [], data.correction || null);
  } catch { /* API not running — silently skip autocomplete */ }
}

function renderDropdown(suggestions, correction) {
  currentCorrection = correction;
  if (!suggestions.length) { closeDropdown(); return; }
  let html = "";
  if (correction) {
    html += `<div class="dropdown-correction">✨ Did you mean <strong>&nbsp;${correction}</strong>?</div>`;
  }
  suggestions.forEach(s => {
    html += `<button class="dropdown-item" onclick="selectSuggestion('${s.word}')">
      <span class="word">${s.word}</span>
      <span class="freq">${Number(s.frequency).toLocaleString()}</span>
    </button>`;
  });
  el.dropdown.innerHTML = html;
  el.dropdown.classList.add("open");
}

function selectSuggestion(word) {
  el.input.value = word;
  closeDropdown();
  runSearch(word);
}

function closeDropdown() {
  el.dropdown.classList.remove("open");
  el.dropdown.innerHTML = "";
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-shell")) closeDropdown();
});

// ── Trending (load on page open) ─────────────────────────────────────────
fetchTrending();
async function fetchTrending() {
  try {
    const res = await fetch(`${API}/api/v1/analytics/trending?k=8`);
    const data = await res.json();
    renderTrending(data.trending || []);
  } catch { /* silent */ }
}

function renderTrending(items) {
  if (!items.length) { el.trendingSection.classList.remove("show"); return; }
  el.trendingChips.innerHTML = items.map((t, i) => `
    <button class="chip" onclick="selectSuggestion('${t.username}')">
      <span class="rank">${String(i+1).padStart(2,"0")}</span>
      <span>${t.username}</span>
      <span class="count">${Number(t.count).toLocaleString()}</span>
    </button>
  `).join("");
  el.trendingSection.classList.add("show");
}

// ── Main search ───────────────────────────────────────────────────────────
async function runSearch(rawQuery) {
  const q = rawQuery.trim();
  if (!q) return;
  closeDropdown();
  hasSearched = true;
  el.hero.classList.add("hidden");
  setLoading(true);
  el.platformsPanel.innerHTML = "";
  el.searchPanel.innerHTML = "";
  el.statsRow.classList.remove("show");
  el.tabs.classList.remove("show");
  el.errorBanner.classList.remove("show");

  try {
    const [searchRes, platformRes] = await Promise.all([
      fetch(`${API}/api/v1/search?q=${encodeURIComponent(q)}`).then(r => {
        if (!r.ok) throw new Error(`search endpoint returned ${r.status}`);
        return r.json();
      }),
      fetch(`${API}/api/v1/search/platforms/${encodeURIComponent(q)}`).then(r => {
        if (!r.ok) throw new Error(`platforms endpoint returned ${r.status}`);
        return r.json();
      }),
    ]);
    renderCorrection(searchRes.corrected_query || null);
    renderStats(platformRes.summary, searchRes.duration_ms);
    renderPlatforms(platformRes.platforms || []);
    renderSearchResults(searchRes.results || []);
    renderTrending(searchRes.trending || []);
    el.tabs.classList.add("show");
  } catch (err) {
    // API unreachable (CORS / not running / network) — make this obvious,
    // don't silently pass off sample data as if it were a real result.
    console.error("brandscan: API request failed —", err);
    el.errorBanner.classList.add("show");
    const demo = demoPlatforms();
    renderStats({ available: 16, taken: 9, unknown: 2, availability_score: 0.59 }, 438);
    renderPlatforms(demo);
    el.tabs.classList.add("show");
  } finally {
    setLoading(false);
  }
}

function setLoading(isLoading) {
  el.scanBtn.disabled = isLoading;
  el.scanBtn.textContent = isLoading ? "Scanning…" : "Scan";
  el.scanSweep.classList.toggle("active", isLoading);
}

function renderCorrection(correction) {
  if (correction) {
    el.correction.innerHTML = `↪ Did you mean <strong>${correction}</strong>?`;
    el.correction.classList.add("show");
    el.correction.onclick = () => { el.input.value = correction; runSearch(correction); };
  } else {
    el.correction.classList.remove("show");
  }
}

function renderStats(summary, durationMs) {
  if (!summary) return;
  const pct = Math.round((summary.availability_score || 0) * 100);
  el.statsRow.innerHTML = `
    ${statCard("open", summary.available, iconCheck())}
    ${statCard("taken", summary.taken, iconX())}
    ${statCard("latency", durationMs + "ms", iconClock())}
    ${statCard("hit rate", pct + "%", iconActivity())}
  `;
  el.statsRow.classList.add("show");
}

function statCard(label, value, icon) {
  return `<div class="stat-card">
    <div class="stat-icon">${icon}</div>
    <div><div class="stat-value">${value}</div><div class="stat-label">${label}</div></div>
  </div>`;
}

function renderPlatforms(platforms) {
  const grouped = {};
  platforms.forEach(p => { (grouped[p.category] = grouped[p.category] || []).push(p); });

  let html = "";
  Object.entries(grouped).forEach(([cat, items]) => {
    html += `<div class="category-block">
      <div class="category-title">${cat} · ${items.length}</div>
      <div class="tile-grid">
        ${items.map((p, i) => platformTile(p, i)).join("")}
      </div>
    </div>`;
  });
  el.platformsPanel.innerHTML = html;
}

function platformTile(p, index) {
  const statusClass = p.available === true ? "open" : p.available === false ? "taken" : "na";
  const label = p.available === true ? "open" : p.available === false ? "taken" : "n/a";
  const statusIcon = p.available === true ? iconCheck() : p.available === false ? iconX() : iconHelp();
  const href = p.available !== false ? (p.url || "#") : "javascript:void(0)";
  return `<a class="p-tile ${statusClass}" href="${href}" target="_blank" rel="noreferrer" style="animation-delay:${index * 22}ms">
    <div class="p-icon-wrap">${iconMarkup(p.platform, p.category)}</div>
    <div class="p-info">
      <div class="p-name">${p.platform}</div>
      <div class="p-status">${label}</div>
    </div>
    <div class="p-status-icon">${statusIcon}</div>
  </a>`;
}

function renderSearchResults(results) {
  if (!results.length) return;
  el.searchPanel.innerHTML = results.map((r, i) => `
    <div class="result-row">
      <div>
        <div class="result-name">${r.name || "—"}</div>
        ${r.description ? `<div class="result-desc">${r.description}</div>` : ""}
        <div class="result-meta">${r.source || "elasticsearch"} · bm25=${r.score !== undefined ? r.score.toFixed(3) : "—"}${r.rrf_score !== undefined ? " · rrf=" + r.rrf_score.toFixed(5) : ""}</div>
      </div>
      <div class="result-rank">#${i+1}</div>
    </div>
  `).join("");
}

// ── Tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    el.platformsPanel.style.display = tab === "platforms" ? "block" : "none";
    el.searchPanel.style.display = tab === "search" ? "block" : "none";
  });
});

// ── Icons (inline SVG, no dependency) ────────────────────────────────────
function iconCheck() { return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`; }
function iconX()     { return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`; }
function iconHelp()  { return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="17" x2="12.01" y2="17"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/></svg>`; }
function iconClock() { return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`; }
function iconActivity() { return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`; }

// ── Demo fallback (used only if API is unreachable) ──────────────────────
function demoPlatforms() {
  return [
    { platform: "GitHub",    category: "dev",      url: "#", available: true  },
    { platform: "Instagram", category: "social",   url: "#", available: false },
    { platform: "Twitter",   category: "social",   url: "#", available: true  },
    { platform: "Reddit",    category: "social",   url: "#", available: true  },
    { platform: "Dev.to",    category: "dev",      url: "#", available: null  },
    { platform: "Twitch",    category: "gaming",   url: "#", available: true  },
    { platform: "Discord",   category: "gaming",   url: "#", available: false },
    { platform: "Dribbble",  category: "creative", url: "#", available: true  },
  ];
}
</script>
